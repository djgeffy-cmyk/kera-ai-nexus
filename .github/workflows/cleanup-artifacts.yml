name: Cleanup Old Artifacts

# Roda todo dia às 03:00 UTC (00:00 Brasília) e apaga qualquer artifact
# com mais de MAX_AGE_DAYS dias. Também pode ser disparado manualmente.
# Isso evita estourar a cota de storage do GitHub Actions.

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      max_age_days:
        description: 'Idade máxima (dias) — artifacts mais velhos serão apagados'
        required: false
        default: '7'

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete artifacts older than N days
        uses: actions/github-script@v7
        env:
          MAX_AGE_DAYS: ${{ github.event.inputs.max_age_days || '7' }}
        with:
          script: |
            const maxAgeDays = parseInt(process.env.MAX_AGE_DAYS, 10) || 7;
            const cutoff = Date.now() - maxAgeDays * 24 * 60 * 60 * 1000;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            core.info(`Apagando artifacts mais velhos que ${maxAgeDays} dias (antes de ${new Date(cutoff).toISOString()})`);

            let deleted = 0;
            let kept = 0;
            let totalBytesFreed = 0;

            const iterator = github.paginate.iterator(
              github.rest.actions.listArtifactsForRepo,
              { owner, repo, per_page: 100 }
            );

            for await (const { data: artifacts } of iterator) {
              for (const art of artifacts) {
                const created = new Date(art.created_at).getTime();
                if (created < cutoff) {
                  try {
                    await github.rest.actions.deleteArtifact({
                      owner, repo, artifact_id: art.id,
                    });
                    deleted++;
                    totalBytesFreed += art.size_in_bytes || 0;
                    core.info(`🗑  Apagado: ${art.name} (id=${art.id}, ${(art.size_in_bytes/1024/1024).toFixed(1)} MB, criado em ${art.created_at})`);
                  } catch (e) {
                    core.warning(`Falha ao apagar ${art.name} (id=${art.id}): ${e.message}`);
                  }
                } else {
                  kept++;
                }
              }
            }

            const freedMb = (totalBytesFreed / 1024 / 1024).toFixed(1);
            core.info(`✅ Concluído. Apagados: ${deleted} | Mantidos: ${kept} | Espaço liberado: ${freedMb} MB`);
            await core.summary
              .addHeading('Cleanup de Artifacts')
              .addTable([
                [{data: 'Métrica', header: true}, {data: 'Valor', header: true}],
                ['Idade máxima (dias)', String(maxAgeDays)],
                ['Apagados', String(deleted)],
                ['Mantidos', String(kept)],
                ['Espaço liberado (MB)', freedMb],
              ])
              .write();