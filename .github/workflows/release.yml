name: Release Kera Desktop

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Vite build
        run: npm run build
        env:
          ELECTRON_BUILD: 'true'

      - name: Build & publish AppImage
        run: npx electron-builder --linux AppImage --config electron-builder.config.cjs --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_OWNER: ${{ github.repository_owner }}
          GH_REPO: ${{ github.event.repository.name }}

  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Vite build
        run: npm run build
        env:
          ELECTRON_BUILD: 'true'

      - name: Build & publish Windows installer
        run: npx electron-builder --win nsis --config electron-builder.config.cjs --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_OWNER: ${{ github.repository_owner }}
          GH_REPO: ${{ github.event.repository.name }}
